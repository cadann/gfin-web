<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFin — Contas a Receber</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f2f1ed;--surface:#fff;--surface2:#fafaf8;
  --border:rgba(0,0,0,0.1);--border-md:rgba(0,0,0,0.18);--border-strong:rgba(0,0,0,0.28);
  --text:#111;--text-dim:#555;--text-faint:#999;
  --accent:#1a56db;--green:#0d7a4e;--amber:#92400e;--red:#b91c1c;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:8px;--r-lg:12px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{
  background:var(--surface);border:1px solid var(--border-md);
  border-radius:var(--r-lg);padding:40px 40px 36px;width:360px;text-align:center;
}
.login-logo{font-size:22px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text-dim);margin-bottom:28px}
.login-card input{
  width:100%;font-family:var(--sans);font-size:13px;padding:9px 12px;
  border:1px solid var(--border-strong);border-radius:var(--r);
  background:var(--bg);color:var(--text);margin-bottom:10px;
}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-btn{
  width:100%;font-family:var(--sans);font-size:13px;font-weight:500;
  padding:9px;border-radius:var(--r);border:none;
  background:var(--text);color:var(--surface);cursor:pointer;
}
.login-btn:hover{background:#333}
.login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}

/* HEADER */
.hdr{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:11px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
.hdr-period{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-left:10px}
.hdr-right{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{
  font-family:var(--sans);font-size:12px;padding:5px 13px;
  border-radius:var(--r);border:1px solid var(--border-strong);
  background:transparent;color:var(--text);cursor:pointer;transition:background .1s;white-space:nowrap;
}
.btn:hover{background:rgba(0,0,0,0.04)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--text);color:var(--surface);border-color:var(--text)}
.btn-primary:hover{background:#333}

/* UPLOAD */
.upload-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 46px);padding:40px 20px;
}
.upload-box{
  background:var(--surface);border:2px dashed var(--border-strong);
  border-radius:var(--r-lg);padding:56px 72px;text-align:center;
  cursor:pointer;transition:all .15s;max-width:480px;width:100%;
}
.upload-box:hover,.upload-box.drag{border-color:var(--accent);background:rgba(26,86,219,0.025)}
.upload-icon{width:48px;height:48px;margin:0 auto 18px;opacity:.25}
.upload-title{font-size:16px;font-weight:500;margin-bottom:6px}
.upload-sub{font-size:12px;color:var(--text-dim);margin-bottom:22px}
.upload-hint{font-size:11px;color:var(--text-faint);margin-top:14px}
.upload-formats{
  display:flex;gap:6px;justify-content:center;margin-top:16px;
}
.fmt-badge{
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:2px 7px;border-radius:4px;
  background:rgba(0,0,0,0.06);color:var(--text-dim);
}

/* ERR NOTICE */
.err-notice{
  background:#fff5f5;border:1px solid rgba(185,28,28,.2);
  border-radius:var(--r);padding:10px 14px;font-size:12px;
  color:var(--red);margin-top:14px;max-width:480px;width:100%;text-align:left;
}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 20px}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px}
.s-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);font-weight:500;margin-bottom:3px}
.s-value{font-family:var(--mono);font-size:16px;font-weight:500}

/* TABLE */
.tbl-wrap{padding:0 20px 40px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;font-size:12px}
thead th{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text-dim);padding:9px 11px;text-align:left;
  background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:7px 11px;border-bottom:1px solid rgba(0,0,0,0.045);font-family:var(--mono);color:var(--text);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(0,0,0,0.012)}
.tr-paid td{color:var(--text-faint)}
.td-nome{font-family:var(--sans);font-size:12px;max-width:210px;overflow:hidden;text-overflow:ellipsis}
.td-r{text-align:right}
.td-c{text-align:center}
.td-cnpj{font-size:11px;color:var(--text-dim)}

/* PGTO INPUT */
.pgto-in{
  width:42px;background:transparent;border:1px solid transparent;
  border-radius:4px;font-family:var(--mono);font-size:12px;
  color:var(--text);text-align:center;padding:2px 3px;transition:border-color .1s;
}
.pgto-in:hover{border-color:var(--border-md)}
.pgto-in:focus{outline:none;border-color:var(--accent);background:rgba(26,86,219,.04)}
.pgto-in.ok{color:var(--green);font-weight:500}
.sl-open{color:var(--amber)}
.sl-paid{color:var(--green)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="v-login" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">GFin</div>
    <div class="login-sub">Contas a Receber — Careli Assessoria</div>
    <input type="email" id="login-email" placeholder="E-mail" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Senha" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="v-app" style="display:none">

<div class="hdr">
  <div style="display:flex;align-items:center">
    <span style="font-size:13px;font-weight:600;letter-spacing:.02em">GFin</span>
    <span style="font-size:12px;color:var(--text-dim);margin-left:6px">Contas a Receber</span>
    <span class="hdr-period" id="hdr-period"></span>
  </div>
  <div class="hdr-right">
    <button class="btn" onclick="doExport()" id="btn-exp" style="display:none">Exportar CSV</button>
    <button class="btn" onclick="resetApp()" id="btn-rst" style="display:none">Nova importação</button>
    <button class="btn" onclick="doLogout()">Sair</button>
  </div>
</div>

<!-- UPLOAD -->
<div id="v-upload" class="upload-wrap">
  <div class="upload-box" id="drop"
    onclick="document.getElementById('finput').click()"
    ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <div class="upload-title">Relação de Contas a Receber</div>
    <div class="upload-sub">Selecione o arquivo exportado pelo sistema</div>
    <button class="btn btn-primary" onclick="event.stopPropagation();document.getElementById('finput').click()">
      Selecionar arquivo
    </button>
    <input type="file" id="finput" accept=".xls,.xlsx,.csv" style="display:none" onchange="handleFile(this.files[0])">
    <div class="upload-formats">
      <span class="fmt-badge">XLS</span>
      <span class="fmt-badge">XLSX</span>
      <span class="fmt-badge">CSV</span>
    </div>
    <div class="upload-hint">ou arraste e solte aqui</div>
  </div>
  <div id="err-notice" class="err-notice" style="display:none"></div>
</div>

<!-- DATA -->
<div id="v-data" style="display:none">
  <div class="summary">
    <div class="s-card">
      <div class="s-label">Total faturado</div>
      <div class="s-value" id="s-tot">—</div>
    </div>
    <div class="s-card">
      <div class="s-label" style="color:var(--green)">Recebido</div>
      <div class="s-value" style="color:var(--green)" id="s-rec">—</div>
    </div>
    <div class="s-card">
      <div class="s-label" style="color:var(--amber)">Em aberto</div>
      <div class="s-value" style="color:var(--amber)" id="s-abr">—</div>
    </div>
    <div class="s-card">
      <div class="s-label">Recebidos / Clientes</div>
      <div class="s-value" id="s-cnt">—</div>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:48px">Cód.</th>
          <th style="min-width:180px">Nome</th>
          <th style="width:148px">CNPJ / CPF</th>
          <th style="width:62px">Boleto</th>
          <th style="width:90px;text-align:right">Valor</th>
          <th style="width:36px;text-align:center">Dis</th>
          <th style="width:88px">Vencimento</th>
          <th style="width:54px;text-align:center">Pgto</th>
          <th style="width:90px;text-align:right">Saldo</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

</div><!-- /v-app -->

<script>
let records = [];

// ── INIT ──────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('cr_data');
  if(saved){
    try{
      records = JSON.parse(saved);
      showView('data');
      renderTable();
      updateSummary();
      const p = localStorage.getItem('cr_period');
      if(p) document.getElementById('hdr-period').textContent = p;
    }catch(e){ localStorage.removeItem('cr_data'); }
  }
})();

function showView(v){
  ['upload','data'].forEach(n=>{
    document.getElementById('v-'+n).style.display = n===v?'':'none';
  });
  document.getElementById('btn-rst').style.display = v==='data'?'':'none';
  document.getElementById('btn-exp').style.display = v==='data'?'':'none';
}

// ── DRAG & DROP ───────────────────────────────────────
function onDragOver(e){e.preventDefault();document.getElementById('drop').classList.add('drag')}
function onDragLeave(){document.getElementById('drop').classList.remove('drag')}
function onDrop(e){
  e.preventDefault();document.getElementById('drop').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f) handleFile(f);
}

// ── FILE HANDLING ─────────────────────────────────────
function handleFile(file){
  if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['xls','xlsx','csv'].includes(ext)){
    showErr('Formato inválido. Use XLS, XLSX ou CSV.');
    return;
  }
  hideErr();
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
      const parsed = parseRows(rows);
      if(!parsed.length){ showErr('Nenhum registro encontrado. Verifique o arquivo.'); return; }
      records = parsed;
      localStorage.setItem('cr_data', JSON.stringify(records));
      detectPeriod(records);
      showView('data');
      renderTable();
      updateSummary();
    }catch(err){
      showErr('Erro ao ler o arquivo: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── PARSER ────────────────────────────────────────────
// Formato do relatório: 2 linhas por cliente
// Linha 1: col[1]=vencimento, col[4]=cod, col[5]=nome, col[21]=boleto, col[27]=valor, col[41]=em_aberto
// Linha 2: col[8]=cnpj
function parseRows(rows){
  const result = [];
  for(let i=0; i<rows.length; i++){
    const row = rows[i];
    const cod = parseFloat(row[4]);
    if(!isNaN(cod) && cod > 0 && row[5] && String(row[5]).trim()){
      // linha de dados do cliente
      const nome     = String(row[5]).trim();
      const boleto   = row[21] ? String(row[21]).replace('.0','').trim() : '';
      const valor    = parseFloat(String(row[27]).replace(',','.')) || 0;
      const emAberto = parseFloat(String(row[41]).replace(',','.')) || valor;
      const venc     = formatDate(row[1]);
      const dis      = venc ? parseInt(venc.split('/')[0], 10) : 0;
      // cnpj na próxima linha, col[8]
      let cnpj = '';
      if(i+1 < rows.length) cnpj = String(rows[i+1][8]||'').trim();
      result.push({
        cod: Math.round(cod),
        nome, cnpj, boleto,
        valor: emAberto,
        dis, vencimento: venc,
        pgto: '', saldo: emAberto
      });
    }
  }
  return result;
}

function formatDate(v){
  if(!v) return '';
  if(typeof v === 'string'){
    // DD/MM/YYYY já ok
    if(/\d{2}\/\d{2}\/\d{4}/.test(v)) return v;
    // YYYY-MM-DD
    if(/\d{4}-\d{2}-\d{2}/.test(v)){
      const [y,m,d] = v.split('-');
      return `${d}/${m}/${y}`;
    }
    return v;
  }
  if(v instanceof Date){
    const d = String(v.getDate()).padStart(2,'0');
    const m = String(v.getMonth()+1).padStart(2,'0');
    const y = v.getFullYear();
    return `${d}/${m}/${y}`;
  }
  return String(v);
}

function detectPeriod(data){
  const v = data.find(r=>r.vencimento)?.vencimento;
  if(!v) return;
  const [,m,y] = v.split('/');
  const mns=['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
             'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const label = `${mns[parseInt(m,10)]}/${y}`;
  document.getElementById('hdr-period').textContent = label;
  localStorage.setItem('cr_period', label);
}

// ── TABLE ─────────────────────────────────────────────
function renderTable(){
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  records.forEach((r,i)=>{
    const paid = r.pgto !== '';
    const tr = document.createElement('tr');
    tr.className = paid ? 'tr-paid' : '';
    tr.innerHTML = `
      <td>${r.cod}</td>
      <td class="td-nome">${r.nome}</td>
      <td class="td-cnpj">${r.cnpj}</td>
      <td>${r.boleto}</td>
      <td class="td-r">${brl(r.valor)}</td>
      <td class="td-c">${r.dis}</td>
      <td>${r.vencimento}</td>
      <td class="td-c">
        <input class="pgto-in${paid?' ok':''}" type="text" value="${r.pgto}"
          placeholder="—" maxlength="2" data-i="${i}" oninput="onPgto(this)">
      </td>
      <td class="td-r ${paid?'sl-paid':'sl-open'}" id="sl-${i}">${brl(r.saldo)}</td>`;
    tb.appendChild(tr);
  });
}

function onPgto(input){
  const i = +input.dataset.i;
  const v = input.value.trim();
  records[i].pgto = v;
  records[i].saldo = v ? 0 : records[i].valor;
  const row = input.closest('tr');
  const sl = document.getElementById('sl-'+i);
  if(v){
    row.className='tr-paid'; input.classList.add('ok'); sl.className='td-r sl-paid';
  } else {
    row.className=''; input.classList.remove('ok'); sl.className='td-r sl-open';
  }
  sl.textContent = brl(records[i].saldo);
  updateSummary();
  localStorage.setItem('cr_data', JSON.stringify(records));
}

function updateSummary(){
  const tot = records.reduce((s,r)=>s+r.valor,0);
  const rec = records.reduce((s,r)=>s+(r.pgto?r.valor:0),0);
  const cnt = records.filter(r=>r.pgto).length;
  document.getElementById('s-tot').textContent = brl(tot);
  document.getElementById('s-rec').textContent = brl(rec);
  document.getElementById('s-abr').textContent = brl(tot-rec);
  document.getElementById('s-cnt').textContent = `${cnt} / ${records.length}`;
}

function brl(n){
  return 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function resetApp(){
  if(!confirm('Limpar dados atuais e importar novo arquivo?')) return;
  records=[];
  localStorage.removeItem('cr_data');
  localStorage.removeItem('cr_period');
  document.getElementById('hdr-period').textContent='';
  document.getElementById('finput').value='';
  showView('upload');
}

function doExport(){
  const h=['Cód.','Nome','CNPJ/CPF','Boleto','Valor','Dis','Vencimento','Pgto','Saldo'];
  const rows=records.map(r=>[
    r.cod,`"${r.nome}"`,r.cnpj,r.boleto,
    r.valor.toFixed(2).replace('.',','),
    r.dis,r.vencimento,r.pgto,
    r.saldo.toFixed(2).replace('.',',')
  ]);
  const csv=[h.join(';'),...rows.map(r=>r.join(';'))].join('\r\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='contas_receber.csv';
  a.click();
}

function showErr(msg){
  const n=document.getElementById('err-notice');
  n.textContent=msg; n.style.display='';
}
function hideErr(){
  document.getElementById('err-notice').style.display='none';
}

// ── AUTH ──────────────────────────────────────────────
function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Preencha e-mail e senha.';return;}
  netlifyIdentity.login(email,pass).catch(()=>{err.textContent='E-mail ou senha incorretos.';});
}
function doLogout(){netlifyIdentity.logout();}
function showApp(){
  document.getElementById('v-login').style.display='none';
  document.getElementById('v-app').style.display='';
}
function showLogin(){
  document.getElementById('v-login').style.display='';
  document.getElementById('v-app').style.display='none';
}
netlifyIdentity.on('login',()=>{netlifyIdentity.close();showApp();});
netlifyIdentity.on('logout',()=>showLogin());
netlifyIdentity.on('init',user=>{user?showApp():showLogin();});
netlifyIdentity.init();
</script>
</body>
</html>
